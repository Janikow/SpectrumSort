<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectrum Pixel Sorter Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@300;400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #05050a;
            --surface: #0d0d18;
            --surface2: #14142a;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6eff;
            --text: #e8e6ff;
            --muted: rgba(232,230,255,0.45);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 1.5rem 2.5rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            align-items: center;
        }

        .title-block h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a89fff 0%, #ff8ef7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .control-group label {
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: var(--muted);
        }

        .btn {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            transition: 0.2s;
        }

        .btn:hover:not(:disabled) { background: #1c1c3a; transform: translateY(-1px); }
        .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        input[type=range] { -webkit-appearance: none; width: 100px; height: 4px; background: var(--surface2); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

        select {
            background: var(--surface2);
            color: white;
            border: 1px solid var(--border);
            padding: 0.4rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            border-radius: 4px;
        }

        .workspace {
            flex: 1;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .canvas-container {
            position: relative;
            background: var(--surface);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--border);
            max-width: 100%;
            overflow: auto;
        }

        canvas { display: block; max-width: 100%; height: auto; margin: 0 auto; }

        .hidden { display: none; }

        .status-card {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 2rem;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
        }

        .progress-track { flex: 1; height: 2px; background: #222; position: relative; }
        .progress-fill { position: absolute; height: 100%; background: var(--accent); transition: width 0.1s; }
    </style>
</head>
<body>

<header>
    <div class="title-block">
        <h1>Spectrum Sorter Pro</h1>
    </div>
    
    <div class="controls-grid">
        <div class="control-group">
            <label>Source</label>
            <button class="btn primary" onclick="document.getElementById('file-input').click()">Upload</button>
            <input type="file" id="file-input" class="hidden" accept="image/*">
        </div>

        <div class="control-group">
            <label>Mode</label>
            <select id="mode-select">
                <option value="hue">Hue</option>
                <option value="brightness">Brightness</option>
                <option value="saturation">Saturation</option>
            </select>
        </div>

        <div class="control-group">
            <label>Threshold (Glitch)</label>
            <input type="range" id="threshold-range" min="0" max="255" value="50">
        </div>

        <div class="control-group">
            <label>Direction</label>
            <select id="dir-select">
                <option value="h">Horizontal</option>
                <option value="v">Vertical</option>
            </select>
        </div>

        <div class="control-group" style="flex-direction: row; align-items: center; margin-top: 15px;">
            <button class="btn" id="sort-btn" disabled>Sort</button>
            <button class="btn" id="stop-btn" disabled>Stop</button>
            <button class="btn" id="reset-btn" disabled>Reset</button>
            <button class="btn" id="download-btn" disabled>Save</button>
        </div>
    </div>
</header>

<div class="workspace">
    <div class="status-card" id="status-card">
        <span id="status-text">Waiting for image...</span>
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <span id="res-text">0 x 0</span>
    </div>

    <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    let originalData = null;
    let isSorting = false;
    let rafId = null;

    // UI Elements
    const fileInput = document.getElementById('file-input');
    const sortBtn = document.getElementById('sort-btn');
    const stopBtn = document.getElementById('stop-btn');
    const resetBtn = document.getElementById('reset-btn');
    const downloadBtn = document.getElementById('download-btn');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');

    fileInput.addEventListener('change', handleUpload);
    sortBtn.addEventListener('click', startSort);
    stopBtn.addEventListener('click', stopSort);
    resetBtn.addEventListener('click', () => {
        stopSort();
        ctx.putImageData(originalData, 0, 0);
        statusText.innerText = "Reset complete";
        progressFill.style.width = '0%';
    });

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'sorted-pixel-art.png';
        link.href = canvas.toDataURL();
        link.click();
    });

    function handleUpload(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                // Resize logic for performance vs quality
                const maxDim = 1200;
                let w = img.width, h = img.height;
                if(w > maxDim || h > maxDim) {
                    const ratio = Math.min(maxDim/w, maxDim/h);
                    w *= ratio; h *= ratio;
                }
                canvas.width = w;
                canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                originalData = ctx.getImageData(0, 0, w, h);
                
                document.getElementById('res-text').innerText = `${Math.floor(w)} x ${Math.floor(h)}`;
                statusText.innerText = "Ready";
                [sortBtn, resetBtn, downloadBtn].forEach(b => b.disabled = false);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    // Mathematical Sorting Keys
    function getVal(pixel, mode) {
        const r = pixel & 0xFF, g = (pixel >> 8) & 0xFF, b = (pixel >> 16) & 0xFF;
        if (mode === 'brightness') return 0.2126 * r + 0.7152 * g + 0.0722 * b;
        if (mode === 'saturation') {
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            return max === 0 ? 0 : (max - min) / max;
        }
        // Hue
        const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
        if (d === 0) return 0;
        let h = (max === r ? (g - b) / d + (g < b ? 6 : 0) : max === g ? (b - r) / d + 2 : (r - g) / d + 4);
        return h / 6;
    }

    async function startSort() {
        if (isSorting) return;
        isSorting = true;
        sortBtn.disabled = true;
        stopBtn.disabled = false;
        
        const mode = document.getElementById('mode-select').value;
        const dir = document.getElementById('dir-select').value;
        const threshold = parseInt(document.getElementById('threshold-range').value);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const buffer = new Uint32Array(imgData.data.buffer);
        const width = canvas.width, height = canvas.height;

        const totalSteps = (dir === 'h' ? height : width);
        let current = 0;

        const process = () => {
            if (!isSorting) return;

            const linesPerFrame = 10; // Batching for speed
            for (let i = 0; i < linesPerFrame && current < totalSteps; i++) {
                let pixels = [];
                let start = 0;

                // Loop through a single row or column
                for (let j = 0; j < (dir === 'h' ? width : height); j++) {
                    const idx = (dir === 'h') ? (current * width + j) : (j * width + current);
                    const val = getVal(buffer[idx], 'brightness');

                    if (val > threshold) {
                        pixels.push(buffer[idx]);
                    } else {
                        if (pixels.length > 0) {
                            pixels.sort((a, b) => getVal(a, mode) - getVal(b, mode));
                            for (let k = 0; k < pixels.length; k++) {
                                const writeIdx = (dir === 'h') ? (current * width + (j - pixels.length + k)) : ((j - pixels.length + k) * width + current);
                                buffer[writeIdx] = pixels[k];
                            }
                            pixels = [];
                        }
                    }
                }
                current++;
            }

            ctx.putImageData(imgData, 0, 0);
            const progress = (current / totalSteps) * 100;
            progressFill.style.width = `${progress}%`;
            statusText.innerText = `Sorting: ${Math.round(progress)}%`;

            if (current < totalSteps) {
                rafId = requestAnimationFrame(process);
            } else {
                stopSort();
                statusText.innerText = "Finish";
            }
        };

        rafId = requestAnimationFrame(process);
    }

    function stopSort() {
        isSorting = false;
        cancelAnimationFrame(rafId);
        sortBtn.disabled = false;
        stopBtn.disabled = true;
    }
</script>
</body>
</html>
